on: [workflow_dispatch]
jobs:
  test-from-project:
    runs-on: ubuntu-latest
    steps:
    - name: Harden the runner (Audit all outbound calls)
      uses: step-security/harden-runner@9ca718d3bf646d6534007c269a635b3e54cadf99 # v2.19.2
      with:
        egress-policy: audit

    - name: 'Checkout'
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with: { fetch-depth: 0 }
    - name: 'Create build.zig.zon'
      run: |
        cat >build.zig.zon <<EOF
        .{
            .name = "test-project"
            .version = "0.0.0",
            .minimum_zig_version = "0.13.0",
            .paths = .{""},
            .fingerprint = 0x43eaf07faceda5c3,
        }
        EOF
    - name: 'Setup Zig'
      uses: ./
      with: { version: '0.13.0' }
    - name: 'Check `zig version`'
      run: |
        if [ "$(zig version)" != '0.13.0' ]; then
          echo "version mismatch: expected '0.13.0', got '$(zig version)'"
          exit 1
        fi
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        zig_version:
          - 'master'
          - 'latest'
          - '2024.5.0-mach'
          - '0.14.0'
          - '0.14.1' # zig-linux-x86_64 -> zig-x86_64-linux
          - '0.15.0'
          - '0.15.1' # armv7a -> arm (though testing on ARM is TODO!)
          - '0.15.2' # some x.x.2
    steps:
    - name: Harden the runner (Audit all outbound calls)
      uses: step-security/harden-runner@9ca718d3bf646d6534007c269a635b3e54cadf99 # v2.19.2
      with:
        egress-policy: audit

    - name: 'Checkout'
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with: { fetch-depth: 0 }
    - name: 'Setup Zig'
      uses: ./
    - name: 'Test `zig init`'
      run: |
        mkdir init
        cd init
        zig init
        zig build test
