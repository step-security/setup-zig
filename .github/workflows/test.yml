on: [workflow_dispatch]
jobs:
  test-from-project:
    runs-on: ubuntu-latest
    steps:
    - name: Harden the runner (Audit all outbound calls)
      uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
      with:
        egress-policy: audit

    - name: 'Checkout'
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with: { fetch-depth: 0 }
    - name: 'Create build.zig.zon'
      run: |
        cat >build.zig.zon <<EOF
        .{
            .name = "test-project"
            .version = "0.0.0",
            .minimum_zig_version = "0.13.0",
            .paths = .{""},
            .fingerprint = 0x43eaf07faceda5c3,
        }
        EOF
    - name: 'Setup Zig'
      uses: ./
      with: { version: '0.13.0' }
    - name: 'Check `zig version`'
      run: |
        if [ "$(zig version)" != '0.13.0' ]; then
          echo "version mismatch: expected '0.13.0', got '$(zig version)'"
          exit 1
        fi
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        zig_version:
          - 'master'
          - 'latest'
          - '2024.5.0-mach'
          - '0.14.0'
          - '0.14.1' # zig-linux-x86_64 -> zig-x86_64-linux
          - '0.15.0'
          - '0.15.1' # armv7a -> arm (though testing on ARM is TODO!)
          - '0.15.2' # some x.x.2
    steps:
    - name: Harden the runner (Audit all outbound calls)
      uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
      with:
        egress-policy: audit

    - name: 'Checkout'
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with: { fetch-depth: 0 }
    - name: 'Setup Zig'
      uses: ./
    - name: 'Test `zig init`'
      run: |
        mkdir init
        cd init
        zig init
        zig build test
